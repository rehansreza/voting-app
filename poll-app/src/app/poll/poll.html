<div class="container mt-4">

  <!-- Create Poll Section -->
  <h2 class="text-center mb-4">Create Poll</h2>

  <form #pollForm="ngForm" (ngSubmit)="createPoll(pollForm)" class="border rounded p-4 shadow-sm">

    <!-- Poll Question -->
    <div class="mb-3">
      <label class="form-label fw-bold">Poll Question</label>
      <input
        name="question"
        [(ngModel)]="newPoll.question"
        placeholder="Enter your poll question"
        class="form-control"
        required
      />
    </div>

    <!-- Poll Options -->
    <div class="mb-3">
      <label class="form-label fw-bold">Options</label>

      <div
        *ngFor="let option of newPoll.options; let i = index"
        class="input-group mb-2"
      >
        <input
          name="option{{ i }}"
          [(ngModel)]="option.optionText"
          placeholder="Option text"
          class="form-control"
          required
        />

        <!-- Remove Option Button -->
        <button
          type="button"
          class="btn btn-danger"
          (click)="removeOption(i)"
          *ngIf="newPoll.options.length > 2"
        >
          Remove
        </button>
      </div>

      <!-- Add Option Button -->
      <button
        type="button"
        class="btn btn-secondary mt-2"
        (click)="addOption()"
      >
        Add Option
      </button>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary w-100 mt-3">
      Create Poll
    </button>

  </form>

  <!-- Available Polls Section -->
  <h2 class="mt-5 text-center">Available Polls</h2>

  <div class="polls-list mt-3">
    <div
      *ngFor="let polls of polls"
      class="border rounded p-3 mb-3 shadow-sm"
    >
      <h4 class="fw-bold">{{ polls.question }}</h4>

      <div class="mt-3">
        <div *ngFor="let options of polls.options; let i = index">
          <button
            (click)="vote(polls.id!, i)"
            class="btn btn-outline-primary me-2 mt-2"
          >
            {{ options.optionText }} — {{ options.voteCount }} votes
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
